<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GYM-Manager</title>
    <link rel="stylesheet" href="../../css/khachhang/home.css" />
    <link rel="stylesheet" href="../../css/khachhang/dichvu.css" />
    <link rel="stylesheet" href="../../css/khachhang/registration-history.css" />
    <link rel="stylesheet" href="../../css/khachhang/active-package.css" />
    <link rel="stylesheet" href="../../css/khachhang/fix-header.css" />
    <link rel="stylesheet" href="../../css/components/alerts.css" />
    <link rel="stylesheet" href="../../css/components/footer.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/components/menu.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="header-container"></div>
    <div id="menu-container"></div>
    <div class="main">
      <div class="dichvu-container">
        <h1>Danh Sách Gói Dịch Vụ</h1>
        <div class="goi-list" id="goi-list">
  <!-- Các thẻ gói dịch vụ sẽ được thêm bằng JavaScript -->
        </div>
      </div>
      
      <div id="goi-hien-tai" style="display:none"></div>
      <div id="goi-het-han"></div>
    </div>
    <!-- Modal xác nhận thanh toán -->
    <div id="modal-xac-nhan" class="modal" style="display:none;">
      <div class="modal-content">
        <span class="close" id="close-xac-nhan">&times;</span>
        <h2>Xác nhận thanh toán</h2>
        <div id="thong-tin-goi"></div>
        <div style="margin: 10px 0;">
          <label for="gio-tap-modal"><strong>Chọn giờ tập:</strong></label>
          <input type="text" id="gio-tap-modal" required placeholder="Ví dụ: 19:00-20:00">
        </div>
        <label for="phuong-thuc-thanh-toan">Chọn phương thức thanh toán:</label>
        <select id="phuong-thuc-thanh-toan">
          <option value="Tiền mặt">Tiền mặt</option>
          <option value="Chuyển khoản">Chuyển khoản</option>
        </select>
        <div id="thong-tin-chuyen-khoan" style="display:none; margin-top:10px;">
          <p><strong>Số tài khoản:</strong> 0935186115</p>
          <p><strong>Ngân hàng:</strong> MBBank</p>
          <p><strong>Chủ tài khoản:</strong> NGUYEN VAN A</p>
          <p class="note">* Vui lòng chuyển khoản trước khi đăng ký với nội dung: "GYM [Tên của bạn]"</p>
        </div>
        <button id="btn-xac-nhan-thanh-toan">Xác nhận đăng ký</button>
      </div>
    </div>

    <!-- Modal hóa đơn chi tiết -->
    <div id="modal-hoa-don" class="modal" style="display:none;">
      <div class="modal-content">
        <span class="close" id="close-hoa-don">&times;</span>
        <h2>Hóa đơn đăng ký dịch vụ</h2>
        <div id="hoa-don-chi-tiet"></div>
        <button onclick="location.reload()">Đóng</button>
      </div>
    </div>
    <div id="footer-container"></div>
    <script src="../../js/components/loadComponents.js"></script>
    <script src="../../js/components/menuScroll.js"></script>
    <script src="../../js/components/navbar.js"></script>
    <script src="../../js/khachhang/hoadon.js"></script>
    <script src="../../js/khachhang/dichvu.js"></script>
    
  </body>
</html>
