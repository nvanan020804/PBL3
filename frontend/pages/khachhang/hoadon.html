<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hóa Đơn - GYM-Manager</title>
    <link rel="stylesheet" href="../../css/admin/hoadon.css" />
    <link rel="stylesheet" href="../../css/components/footer.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/components/menu.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="header-container"></div>
    <div id="menu-container"></div>
    
    <div class="container mt-4">
      <h2>Hóa Đơn Đăng Ký Gói Dịch Vụ</h2>

      <!-- Bảng Hóa Đơn -->
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID Hóa Đơn</th>
              <th>Thời Gian Tạo</th>
              <th>Tổng Tiền</th>
              <th>Trạng Thái</th>
              <th>Trạng Thái Thanh Toán</th>
              <th>Thao Tác</th>
            </tr>
          </thead>
          <tbody id="invoiceTableBody">
            <!-- Dữ liệu hóa đơn sẽ được thêm ở đây bằng JavaScript -->
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button class="btn btn-secondary" onclick="window.history.back()">Quay Lại</button>
      </div>
    </div>

    <!-- Modal Chi Tiết Hóa Đơn -->
    <div class="modal fade" id="invoiceDetailModal" tabindex="-1" aria-labelledby="invoiceDetailModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="invoiceDetailModalLabel">Chi Tiết Hóa Đơn</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="invoiceDetailContent">
            <!-- Nội dung chi tiết hóa đơn sẽ được thêm ở đây -->
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/components/loadComponents.js"></script>
    <script src="../../js/components/menuScroll.js"></script>
    <script src="../../js/khachhang/hoadon.js"></script>
  </body>
</html>
