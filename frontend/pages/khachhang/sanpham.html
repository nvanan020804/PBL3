<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Sản phẩm - GYM-Manager</title>
  <link rel="stylesheet" href="../../css/khachhang/sanpham.css" />
  <link rel="stylesheet" href="../../css/components/footer.css" />
  <link rel="stylesheet" href="../../css/components/header.css" />
  <link rel="stylesheet" href="../../css/components/menu.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div id="header-container"></div>
  <div id="menu-container"></div>
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Danh Sách Sản Phẩm</h2>
    </div>
    <div class="row mb-3">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm sản phẩm...">
      </div>
      <div class="col-md-4">
        <select id="categoryFilter" class="form-select">
          <option value="all">Tất cả danh mục</option>
          <!-- JS sẽ render thêm các option danh mục -->
        </select>
      </div>
    </div>
    <div id="productsContainer" class="row"></div>
  </div>

  <!-- Modal xem chi tiết sản phẩm -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Chi Tiết Sản Phẩm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/components/loadComponents.js"></script>
  <script src="../../js/khachhang/sanpham.js"></script>
</body>
</html>
