<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ khách hàng</title>
    <link rel="stylesheet" href="../../css/khachhang/profile.css">
    <link rel="stylesheet" href="../../css/khachhang/home.css" />
    <link rel="stylesheet" href="../../css/khachhang/dichvu.css" />
    <link rel="stylesheet" href="../../css/components/footer.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/components/menu.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
</head>
<body>
    <div id="header-container"></div>
    <div id="menu-container"></div>
      <main class="profile-container">
        <h1>Thông tin tài khoản</h1>
        
        <div class="profile-info">
            <div class="info-row">
                <span class="info-label"><i class="fas fa-user"></i> Họ tên:</span>
                <span id="profile-name" class="info-value"></span>
                <input id="edit-name" class="info-value" style="display:none;" placeholder="Nhập họ tên của bạn" />
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-calendar"></i> Năm sinh:</span>
                <span id="profile-birthyear" class="info-value"></span>
                <input id="edit-birthyear" class="info-value" style="display:none;" type="number" min="1900" max="2100" placeholder="Nhập năm sinh của bạn" />
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-id-card"></i> CCCD:</span>
                <span id="profile-cccd" class="info-value"></span>
                <input id="edit-cccd" class="info-value" style="display:none;" placeholder="Nhập số CCCD của bạn" />
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-envelope"></i> Email:</span>
                <span id="profile-email" class="info-value"></span>
                <input id="edit-email" class="info-value" style="display:none;" type="email" placeholder="Nhập email của bạn" />
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-phone"></i> Số điện thoại:</span>
                <span id="profile-phone" class="info-value"></span>
                <input id="edit-phone" class="info-value" style="display:none;" placeholder="Nhập số điện thoại của bạn" />
            </div>
        </div>
        
        <div class="profile-actions">
            <button id="btn-edit" type="button" class="btn btn-primary">
                <i class="fas fa-edit"></i> Sửa thông tin
            </button>
            <button id="btn-save" type="button" class="btn btn-success" style="display:none;">
                <i class="fas fa-save"></i> Lưu thay đổi
            </button>
            <button id="btn-cancel" type="button" class="btn btn-secondary" style="display:none;">
                <i class="fas fa-times"></i> Hủy bỏ
            </button>
        </div>
    </main>
    
    <div id="footer-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../../js/components/loadComponents.js"></script>
    <script src="../../js/components/menuScroll.js"></script>
    <script src="../../js/components/navbar.js"></script>
    <script src="../../js/khachhang/profile.js"></script>

</body>
</html>
