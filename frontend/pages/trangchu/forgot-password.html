<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - GYM Manager</title>
    <link rel="stylesheet" href="../../css/trangchu/login.css">
</head>
<body>
    <div class="page-container">
        <div class="login-container">
            <form class="login-form forgot-password-form" id="forgotPasswordForm">
                <h2>Quên mật khẩu</h2>
                <div class="input-box">
                    <input type="text" id="username" placeholder="Tên đăng nhập" required>
                </div>
                <div class="input-box">
                    <input type="text" id="contact" placeholder="Số điện thoại hoặc Email" required>
                </div>
                <div id="forgotError" class="error-message"></div>
                <input type="submit" value="Xác nhận">
                <a href="login.html" class="back-login">Quay lại đăng nhập</a>
            </form>
        </div>
    </div>
    <script src="../../js/trangchu/forgot-password.js"></script>
</body>
</html>
