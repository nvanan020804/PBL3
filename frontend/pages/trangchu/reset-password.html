<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - GYM Manager</title>
    <link rel="stylesheet" href="../../css/trangchu/login.css">
</head>
<body>
    <div class="page-container">
        <div class="login-container">
            <form class="login-form reset-password-form" id="resetPasswordForm">
                <h2>Đặt lại mật khẩu</h2>
                <div class="input-box">
                    <input type="password" id="newPassword" placeholder="Mật khẩu mới" required>
                </div>
                <div class="input-box">
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                </div>
                <div id="resetError" class="error-message"></div>
                <input type="submit" value="Đặt lại mật khẩu">
                <a href="login.html" class="back-login">Quay lại đăng nhập</a>
            </form>
        </div>
    </div>
    <script src="../../js/trangchu/reset-password.js"></script>
</body>
</html>
