<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM-Manager</title>
    <link rel="stylesheet" href="./css/pages/index.css">
    <link rel="stylesheet" href="./css/components/footer.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="menu-container"></div>
    <div class="main">
        <section class="img-introduce">
            <img src="./assets/img/home1.jpg" alt="ảnh giới thiệu gói tập">
        </section>
    
        <section class="goi-introduce">
            <div class="goi-content">
               <div class="goi-title">
                    <h2>GÓI TẬP GYM</h2>
                    <p>Giới thiệu các gói gym phù hợp cho nhu cầu của từng hội viên</p>
               </div>
               <div class="goitap">
                    <div class="goi">
                        <img src="./assets/img/goithang1.jpeg">
                        <p>Gói 1 tháng / người</p>
                        <p>Giá: 300.000đ</p>
                    </div>
                    <div class="goi">
                        <img src="./assets/img/goithang2.jpg">
                        <p>Gói 3 tháng / người</p>
                        <p>Giá: 750.000đ</p>
                    </div>
                    <div class="goi">
                        <img src="./assets/img/goithang3.jpg">
                        <p>Gói 6 tháng / người</p>
                        <p>Giá: 1.200.000đ</p>
                    </div>
               </div>
            </div>
        </section>
        <section class="trainers">
            <!-- Giới thiệu HLV -->
        </section>
    
        <section class="feedback">
            <!-- Đánh giá khách hàng -->
        </section>
    
        <section class="contact">
            <!-- Thông tin liên hệ -->
        </section>
    </div>
    <div id="footer-container"></div>
    <script>
        // Load header
        fetch('components/header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            });
        // Load menu
        fetch('components/menu.html')  // Nhúng menu từ file menu.html
            .then(res => res.text())
            .then(data => {
                document.getElementById('menu-container').innerHTML = data;
            });

        // Load footer
        fetch('components/footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
</body>
</html>
